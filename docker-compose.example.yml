services:
  lg-webos-magic-touchpad:
    build: .
    container_name: lg-webos-magic-touchpad
    restart: unless-stopped
    network_mode: host
    environment:
      LG_TV_IP: "192.168.1.50"
      LG_KEYFILE: "/data/client_key.json"
      LG_SERVER_HOST: "0.0.0.0"
      LG_SERVER_PORT: "5055"
      LG_SECURE: "false"
      # LG_SSL_CERT: "/data/cert.pem"
      # LG_SSL_KEY: "/data/key.pem"
    volumes:
      - ./data:/data
